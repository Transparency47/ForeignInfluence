name: Import FEC Bulk Catch-Up

on:
  workflow_dispatch:
    inputs:
      cycles:
        description: "Comma-separated FEC cycles to import."
        required: false
        default: "2016,2018,2020,2022,2024,2026"
        type: string

permissions:
  contents: write

concurrency:
  group: import-fec-bulk
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import FEC bulk data
        env:
          CYCLES: ${{ inputs.cycles || '2016,2018,2020,2022,2024,2026' }}
        run: python Scripts/import_fec_bulk.py --cycles "${CYCLES}"

      - name: Generate listing
        run: python Scripts/generate_listing.py

      - name: Verify generated output
        run: |
          set -euo pipefail
          test -f listing.json
          test -d AIPAC
          if [[ -d Reports ]]; then
            echo "Generated output must use the PAC/YYYY/MM structure, not Reports/." >&2
            exit 1
          fi
          if find AIPAC UnitedDemocracyProject JStreetPAC NORPAC DMFIPAC USINPAC TurkishCoalition ArmenianNational CubanAmerican IranianAmerican -name metadata.md -print -quit 2>/dev/null | grep -q .; then
            echo "Monthly metadata.md files should be README.md for GitHub rendering." >&2
            exit 1
          fi
          if find AIPAC UnitedDemocracyProject JStreetPAC NORPAC DMFIPAC USINPAC TurkishCoalition ArmenianNational CubanAmerican IranianAmerican \( -name 'FEC_Filing_*.md' -o -name 'Daily_Filings.md' \) -print -quit 2>/dev/null | grep -q .; then
            echo "Generated output must contain only PoliticianName.md and README.md in monthly folders." >&2
            exit 1
          fi
          if grep -R -nE '/Users/|Local source|sourcePath|govinfoBulkSourcePath' README.md Scripts listing.json AIPAC UnitedDemocracyProject JStreetPAC NORPAC DMFIPAC USINPAC TurkishCoalition ArmenianNational CubanAmerican IranianAmerican 2>/dev/null; then
            echo "Local path leak detected." >&2
            exit 1
          fi

      - name: Commit generated changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No generated changes to commit."
            exit 0
          fi

          git add listing.json
          for dir in AIPAC UnitedDemocracyProject JStreetPAC NORPAC DMFIPAC USINPAC TurkishCoalition ArmenianNational CubanAmerican IranianAmerican; do
            [[ -e "$dir" ]] && git add "$dir"
          done
          git commit -m "Import FEC bulk data"
          git push
