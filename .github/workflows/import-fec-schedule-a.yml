name: Import FEC Schedule A

on:
  workflow_dispatch:
    inputs:
      csv_url:
        description: "Optional URL to an FEC Schedule A CSV export."
        required: false
        type: string
      csv_path:
        description: "Repo-local CSV path to import when csv_url is blank."
        required: false
        default: "Data/schedule_a.csv"
        type: string
  schedule:
    - cron: "17 8 * * 1"
  push:
    branches:
      - main
    paths:
      - "Data/**/*.csv"
      - "Scripts/import_fec_schedule_a.py"
      - "Scripts/generate_listing.py"
      - ".github/workflows/import-fec-schedule-a.yml"

permissions:
  contents: write

concurrency:
  group: import-fec-schedule-a
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve CSV input
        id: csv
        shell: bash
        env:
          CSV_URL: ${{ inputs.csv_url || secrets.FEC_SCHEDULE_A_CSV_URL }}
          CSV_PATH: ${{ inputs.csv_path || 'Data/schedule_a.csv' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/foreign-influence
          output="/tmp/foreign-influence/schedule_a.csv"

          if [[ -n "${CSV_URL}" ]]; then
            curl -fsSL "${CSV_URL}" -o "${output}"
          elif [[ -f "${CSV_PATH}" ]]; then
            cp "${CSV_PATH}" "${output}"
          else
            latest="$(find Data -type f -name '*.csv' -print 2>/dev/null | sort | tail -n 1 || true)"
            if [[ -z "${latest}" ]]; then
              echo "No CSV input found. Provide workflow_dispatch csv_url or commit a CSV under Data/." >&2
              exit 1
            fi
            cp "${latest}" "${output}"
          fi

          echo "path=${output}" >> "${GITHUB_OUTPUT}"

      - name: Import FEC data
        run: python Scripts/import_fec_schedule_a.py "${{ steps.csv.outputs.path }}"

      - name: Generate listing
        run: python Scripts/generate_listing.py

      - name: Verify generated output
        run: |
          set -euo pipefail
          test -f listing.json
          test -d AIPAC
          if find AIPAC -name metadata.md -print -quit | grep -q .; then
            echo "Monthly metadata.md files should be README.md for GitHub rendering." >&2
            exit 1
          fi
          if grep -R -nE '/Users/|Local source|sourcePath|govinfoBulkSourcePath' README.md AIPAC Scripts listing.json; then
            echo "Local path leak detected." >&2
            exit 1
          fi

      - name: Commit generated changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No generated changes to commit."
            exit 0
          fi

          git add AIPAC listing.json
          git commit -m "Import FEC Schedule A data"
          git push
